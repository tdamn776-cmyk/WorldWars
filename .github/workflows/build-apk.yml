name: Build Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install App Dependencies
        run: |
          cd client
          npm install
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Build React 3D App
        run: |
          cd client
          npm run build

      - name: Setup Android & Capacitor
        run: |
          cd client
          npx cap init WorldWars com.worldwars.game --web-dir dist || echo "Already initialized"
          npx cap add android || echo "Already added"
          npx cap sync android

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Build Release APK
        run: |
          cd client/android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: WorldWars-APK
          path: client/android/app/build/outputs/apk/debug/app-debug.apk
