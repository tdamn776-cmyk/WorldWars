name: Build Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Client Dependencies
        working-directory: client
        run: |
          npm install
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Build Vite App
        working-directory: client
        run: npm run build

      - name: Init Capacitor
        working-directory: client
        run: npx cap init WorldWars com.worldwars.game --web-dir dist || true

      - name: Add Android Platform
        working-directory: client
        run: npx cap add android || true

      - name: Copy App Icons
        working-directory: client
        run: |
          ICON_SRC="public/icons/game-logo.png"
          for d in mipmap-mdpi mipmap-hdpi mipmap-xhdpi mipmap-xxhdpi mipmap-xxxhdpi; do
            DIR="android/app/src/main/res/$d"
            mkdir -p "$DIR"
            cp "$ICON_SRC" "$DIR/ic_launcher.png"
            cp "$ICON_SRC" "$DIR/ic_launcher_round.png"
            cp "$ICON_SRC" "$DIR/ic_launcher_foreground.png"
          done

      - name: Make App Fullscreen (Immersive)
        working-directory: client
        run: |
          STYLES="android/app/src/main/res/values/styles.xml"
          cat > "$STYLES" << 'XMLEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
            <style name="AppTheme" parent="Theme.AppCompat.NoActionBar">
              <item name="android:windowFullscreen">true</item>
              <item name="android:windowNoTitle">true</item>
              <item name="android:windowActionBar">false</item>
              <item name="android:windowContentOverlay">@null</item>
            </style>
            <style name="AppTheme.NoActionBar" parent="AppTheme">
              <item name="android:windowFullscreen">true</item>
            </style>
            <style name="AppTheme.NoActionBarLaunch" parent="AppTheme.NoActionBar">
              <item name="android:background">@drawable/splash</item>
            </style>
          </resources>
          XMLEOF
          mkdir -p android/app/src/main/res/drawable
          rm -f android/app/src/main/res/drawable/splash.png
          rm -f android/app/src/main/res/drawable-land-hdpi/splash.png
          rm -f android/app/src/main/res/drawable-land-mdpi/splash.png
          rm -f android/app/src/main/res/drawable-land-xhdpi/splash.png
          rm -f android/app/src/main/res/drawable-land-xxhdpi/splash.png
          rm -f android/app/src/main/res/drawable-land-xxxhdpi/splash.png
          rm -f android/app/src/main/res/drawable-port-hdpi/splash.png
          rm -f android/app/src/main/res/drawable-port-mdpi/splash.png
          rm -f android/app/src/main/res/drawable-port-xhdpi/splash.png
          rm -f android/app/src/main/res/drawable-port-xxhdpi/splash.png
          rm -f android/app/src/main/res/drawable-port-xxxhdpi/splash.png
          echo '<layer-list xmlns:android="http://schemas.android.com/apk/res/android"><item android:drawable="@color/splash_bg"/></layer-list>' > android/app/src/main/res/drawable/splash.xml
          mkdir -p android/app/src/main/res/values
          grep -q "splash_bg" android/app/src/main/res/values/colors.xml 2>/dev/null || echo '<?xml version="1.0" encoding="utf-8"?><resources><color name="splash_bg">#0a0a0f</color></resources>' > android/app/src/main/res/values/colors.xml

      - name: Sync Capacitor
        working-directory: client
        run: npx cap sync android

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Fix Kotlin & Build APK
        working-directory: client/android
        run: |
          echo "allprojects { configurations.all { resolutionStrategy { force 'org.jetbrains.kotlin:kotlin-stdlib:1.9.22'; force 'org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.9.22'; force 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.9.22' } } }" >> build.gradle
          chmod +x gradlew
          ./gradlew assembleDebug
          cp app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/WorldWars.apk

      - name: Upload WorldWars APK
        uses: actions/upload-artifact@v4
        with:
          name: WorldWars
          path: client/android/app/build/outputs/apk/debug/WorldWars.apk
          compression-level: 0
